<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Moment I've Been Waiting For</title>
    <link rel="icon" href="../Assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="ask.css" />
</head>

<body>
    <div class="proposal-container">
        <h1 class="page-title">The Moment I've Been Waiting For</h1>
        <p class="page-subtitle">And now, it's just you and me.</p>

        <div class="proposal-card">
            <h2 class="card-headline">Komal...<br>Will You Be Mine Forever?</h2>
            
            <div class="image-wrapper">
                <img id="image" src="../Assets/handsome.gif" alt="Handsome GIF">
            </div>

            <div class="buttons">
                <button type="button" class="btn-yes" id="yes" onclick="yesFunction()"
                    onmouseover="ChangeImage('love'); bg1();" onmouseout="ResetImage(); resetBG();">
                    <span>YES ❤️</span>
                </button>
                <button type="button" class="btn-no" id="no" onclick="noFunction()"
                    onmouseover="ChangeImage('depressed'); bg2()" onmouseout="ResetImage(); resetBG();">
                    <span>NO 😔</span>
                </button>
            </div>
        </div>
    </div>

    <div class="watermark">
        Made with ❤️ for Komal
    </div>

    <script src="ask.js"></script>
</body>

</html>
