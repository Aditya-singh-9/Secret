<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter From My Heart</title>
    <link rel="icon" href="../Assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="secondPage.css" />
</head>

<body>
    <div class="letter-container">
        <h1 class="page-title">A Letter From My Heart</h1>
        <p class="page-subtitle">Every word is a piece of how deeply I feel for you.</p>

        <div class="letter-card">
            <!-- Sealed state -->
            <div id="sealed-content" class="sealed-content">
                <div class="envelope-icon">✉️</div>
                <h3 class="seal-title">This letter is sealed for Komal</h3>
                <button type="button" class="btn-gradient" id="open-btn" onclick="openLetter()">Open Letter 💖</button>
            </div>

            <!-- Revealed letter state -->
            <div id="revealed-content" class="revealed-content" style="display: none;">
                <div class="letter-text" id="typewriter-text"></div>
            </div>
        </div>

        <div id="continue-wrapper" class="continue-wrapper" style="display: none;">
            <button type="button" class="btn-outline" id="btn" onclick="myFunction()">Continue 💖</button>
        </div>
    </div>

    <div class="watermark">
        Made with ❤️ for Komal
    </div>

    <script src="secondPage.js"></script>
</body>

</html>
