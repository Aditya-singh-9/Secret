<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparing Something Special...</title>
    <link rel="icon" href="../Assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="thirdPage.css" />
</head>

<body>
    <div class="loader-container">
        <div class="loader-card">
            <!-- Loading state -->
            <div id="loader-content" class="loader-content">
                <h1 class="loader-title">Preparing Something Special</h1>
                <div class="spinner-heart">❤️</div>
                <p class="loader-text">Setting the mood for you...</p>
            </div>

            <!-- Ready state -->
            <div id="ready-content" class="ready-content" style="display: none;">
                <h1 class="loader-title">Everything is Ready</h1>
                <p class="loader-text">Ready to step in?</p>
                <button id="enable" class="btn-gradient">Enter 💖</button>
            </div>
        </div>
    </div>

    <div class="watermark">
        Made with ❤️ for Komal
    </div>

    <script src="thirdPage.js"></script>
</body>

</html>
